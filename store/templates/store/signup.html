{% load static %}
<!DOCTYPE html>
<html>
<head>

    <title>Sign Up | TechStore</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{% static 'store/css/style.css' %}">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>

<body class="bg-light">

<div class="container">

    <div class="row justify-content-center align-items-center" style="min-height:100vh;">

        <div class="col-md-6">

            <div class="card shadow-lg p-4">

                <div class="text-center mb-4">

                    <h1>🛒</h1>

                    <h2 class="text-primary fw-bold">
                        Create Account
                    </h2>

                    <p class="text-muted">
                        Join TechStore Today
                    </p>

                </div>

                <form method="POST">

                    {% csrf_token %}

                    <div class="mb-3">

                        <label>Username</label>

                        <input type="text"
                               name="username"
                               class="form-control"
                               required>

                    </div>

                    <div class="mb-3">

                        <label>Email</label>

                        <input type="email"
                               name="email"
                               class="form-control"
                               required>

                    </div>

                    <div class="mb-3">

                        <label>Password</label>

                        <input type="password"
                               name="password"
                               class="form-control"
                               required>

                    </div>

                    <div class="mb-3">

                        <label>Confirm Password</label>

                        <input type="password"
                               name="confirm_password"
                               class="form-control"
                               required>

                    </div>

                    <button class="btn btn-success w-100">
                        🚀 Create Account
                    </button>

                </form>

                <hr>

                <p class="text-center">
                    Already have an account?
                    <a href="{% url 'login' %}">
                        Login
                    </a>
                </p>

            </div>

        </div>

    </div>

</div>

</body>
</html>
