{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Payment | TechStore</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{% static 'store/css/style.css' %}">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-6">

            <div class="card shadow-lg p-4">

                <h2 class="text-center text-primary mb-4">
                    💳 Payment
                </h2>

                <h5>Select Payment Method</h5>

                <form method="POST" action="{% url 'payment_success' %}">
                    {% csrf_token %}

                    <input type="hidden" name="name" value="{{name}}">
                    <input type="hidden" name="mobile" value="{{mobile}}">
                    <input type="hidden" name="email" value="{{email}}" class="from-control" readonly>
                    <input type="hidden" name="address" value="{{address}}">
                    <input type="hidden" name="city" value="{{city}}">
                    <input type="hidden" name="state" value="{{state}}">
                    <input type="hidden" name="pincode" value="{{pincode}}">

                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="payment" value="UPI" checked>
                        <label class="form-check-label">
                            📱 UPI
                        </label>
                    </div>

                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="payment" value="Card">
                        <label class="form-check-label">
                            💳 Credit / Debit Card
                        </label>
                    </div>

                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="payment" value="Net Banking">
                        <label class="form-check-label">
                            🏦 Net Banking
                        </label>
                    </div>

                    <div class="form-check mb-4">
                        <input class="form-check-input" type="radio" name="payment" value="COD">
                        <label class="form-check-label">
                            💵 Cash on Delivery
                        </label>
                    </div>

                    <button class="btn btn-success w-100">
                        ✅ Pay Now
                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

</body>
</html>
